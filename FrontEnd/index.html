<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Ordering System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to KJC Pizza</h1>
    </header>
    <main>
        <section id="order-form">
            <h2>Order Your Pizza</h2>
            <form>
                <label for="pizza-size">Choose your pizza size:</label>
                <select id="pizza-size" name="pizza-size">
                    <option value="small">Small</option>
                    <option value="medium">Medium</option>
                    <option value="large">Large</option>
                </select>

                <label for="toppings">Choose your toppings:</label>
                <input type="checkbox" id="pepperoni" name="toppings" value="pepperoni">
                <label for="pepperoni">Pepperoni</label>
                <input type="checkbox" id="mushrooms" name="toppings" value="mushrooms">
                <label for="mushrooms">Mushrooms</label>
                <!-- Add more toppings as needed -->

                <button type="submit">Order Now</button>
            </form>

        </section>
        <div id="popup" class="popup">
            <div class="popup-content">
                <span class="close">&times;</span>
                <h2>Special Discount!</h2>
                <p>Use code <strong>DISCOUNT20</strong> for 20% off!</p>
                <button>Shop Now</button>
            </div>
        </div>

    </main>
    <script src="scripts.js"></script>
</body>
</html>
